<!DOCTYPE html>

<html>

<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
      rel="stylesheet" >
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body class="page">
  <header class="header">
    <img class="header__image" src="./eisenhower-matrix.jpg" alt="Eisenhower matrix">
    <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower"
        >Want more details?</a>
  </header>
  <main class="main">
    <section class="task-list"  id="add-task">
      <h1 class="task-list__title">Add Item</h1>
      <ul class="task-list__items">
        <li class="task-list__item">
          <input class="task-list__field task-list__field_new" type="text">
          <button class="button button_add">Add</button>
        </li>
      </ul>
    </section>
    <section class="task-list"  id="incomplete-tasks">
      <h2 class="task-list__title">Todo</h2>
      <ul class="task-list__items">
        <li class="task-list__item">
          <input class="task-list__checkbox" type="checkbox">
          <label class="task-list__task-name">Pay Bills</label>
          <input class="task-list__field" type="text">
          <button class="button button_edit">Edit</button>
          <button class="button button_delete"></button>
        </li>
        <li class="task-list__item task-list__item_changing">
          <input class="task-list__checkbox" type="checkbox">
          <label class="task-list__task-name">Go Shopping</label>
          <input class="task-list__field" type="text" value="Go Shopping">
          <button class="button button_edit">Save</button>
          <button class="button button_delete"></button>
        </li>
      </ul>
    </section>
    <section class="task-list" id="completed-tasks">
      <h2 class="task-list__title">Completed</h2>
      <ul class="task-list__items" >
        <li  class="task-list__item">
          <input class="task-list__checkbox" type="checkbox" checked>
          <label class="task-list__task-name">See the Doctor</label>
          <input class="task-list__field" type="text">
          <button class="button button_edit">Edit</button>
          <button class="button button_delete"></button>
        </li>
      </ul>
    </section>
  </main>
  <script type="text/javascript" src="app.js"></script>
</body>

</html>

<!DOCTYPE html>

<html>

<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
      rel="stylesheet" >
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body class="page">
  <header class="header">
    <img class="header-image" src="./eisenhower-matrix.jpg">
    <a class="header-link" href="https://goal-life.com/page/method/matrix-eisenhower"
        >Want more details?</a>
  </header>
  <main class="main">
    <section class="task-list" id="add-task">
      <h1 class="task-list-title">Add Item</h1>
      <div class="task-row-wrapper">
        <input id="new-task" class="task" type="text">
        <button class="button button_add">Add</button>
      </div>
    </section>
    <section  id="incomplete-tasks">
      <h2 class="task-list-title">Todo</h2>
      <ul class="task-list">
        <li class="task-list-item">
          <input class="checkbox" type="checkbox">
          <label class="task-name">Pay Bills</label>
          <input type="text" class="task">
          <button class="button button_edit">Edit</button>
          <button class="button button_delete"><img class="delete-image" src="./remove.svg"></button>
        </li>
        <li class="task-list-item change-mode">
          <input class="checkbox" type="checkbox">
          <label class="task-name">Go Shopping</label>
          <input type="text" value="Go Shopping" class="task">
          <button class="button button_edit">Save</button>
          <button class="button button_delete"><img class="delete-image" src="./remove.svg"></button>
        </li>
      </ul>
    </section>
    <section id="completed-tasks">
      <h2 class="task-list-title">Completed</h2>
      <ul class="task-list" >
        <li  class="task-list-item">
          <input class="checkbox" type="checkbox" checked>
          <label class="task-name">See the Doctor</label>
          <input type="text" class="task">
          <button class="button button_edit">Edit</button>
          <button class="button button_delete"><img class="delete-image" src="./remove.svg"></button>
        </li>
      </ul>
    </section>
  </main>
  <script type="text/javascript" src="app.js"></script>
</body>

</html>
